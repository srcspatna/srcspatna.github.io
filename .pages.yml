media:
  - name: public_media
    label: Public Assets
    input: public
    output: /
  - name: source_assets
    label: Source Assets
    input: src/assets
    output: /assets
components:
  seo:
    type: object
    label: SEO
    fields:
      - name: focus_keyword
        label: SEO Focus Keyword
        type: string
      - name: seo_title
        label: SEO Title
        type: string
      - name: seo_description
        label: SEO Description
        type: text
content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    view:
      fields: [ title, draft, date ]
    filename: "{year}-{month}-{day}-{fields.slug}.md"
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name : section, label: Section, type: string, required: true }
      - { name: slug, label: Slug, type: string }
      - { name: sourceUrl, label: "Source Url", type: string }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text,
          options: { 
            input: src/assets/posts,
            output: /assets/posts
          } 
        }
      - { name: seo, component: seo, label: SEO Meta Data }
      - { name: seobody, label: "SEO Body", type: rich-text,
          options: {
            input: src/assets/posts,
            output: /assets/posts
          }
        }
  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    view:
      fields: [ title, draft, date ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name : section, label: Section, type: string, required: true }
      - { name: slug, label: Slug, type: string }
      - { name: sourceUrl, label: "Source Url", type: string }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text, 
          options: { 
            input: src/assets/pages,
            output: /assets/pages
          } 
        }
      - { name: seo, component: seo, label: SEO Meta Data }
      - { name: seobody, label: "SEO Body", type: rich-text,
          options: {
            input: src/assets/pages,
            output: /assets/pages
          }
        }
  - name: achievers-gallery
    label: Achievers Gallery
    type: collection
    path: src/content/posts/achievers-gallery
    view:
      fields: [ title, draft, date ]
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/PostsLayout.astro" }
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text, 
          options: { 
            format: html,
            input: src/assets,
            output: /assets
          } 
        }
  - name: marquee_items
    label: Marquee Items
    type: collection
    path: src/content/data/marquee_items
    view:
      fields: [ description ]
    fields:
      - { name: description, label: Description, type: string }
  - name: showcase
    label: Showcase Items
    type: collection
    path: src/content/data/showcase
    view:
      fields: [ eyebrow, title, description ]
    fields:
      - { name: eyebrow, label: Eyebrow, type: string }
      - { name: title, label: Title, type: string }
      - { name: description, label: Description, type: string }
      - { name: ctaLabel, label: CTA Label, type: string }
      - { name: ctaHref, label: CTA Href, type: string }
      - { name: secondaryLabel, label: Secondary Label, type: string }
      - { name: secondaryHref, label: Secondary Href, type: string }
      - { name: statLabel, label: Stat Label, type: string }
      - { name: statValue, label: Stat Value, type: string }
      - { name: accent,
          label: Accent,
          type: select,
          options: {
            values: [ "amber", "emerald", "blue" ]
          }
        }
  - name: home
    label: Home page
    type: file
    path: src/pages/Home.md
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/PageLayout.astro" }
      - { name: title, label: Title, type: string }
      - { name: body, label: Body, type: rich-text, options: { input: src/assets, output: /assets } }
  - name: footer
    label: Footer
    type: file
    path: src/content/data/footer.md
    fields:
      - { name: primaryText, label: Primary Text, type: string }
      - { name: secondaryText, label: Secondary Text, type: string }
